version: "3.3"

services:

  mysql:
    image: mysql:8
    container_name: urban_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: urbanClap
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./server
    container_name: urban_backend
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: urbanClap
      DB_USER: root
      DB_PASS: 123456
    ports:
      - "8082:8080"

  frontend:
    build:
      context: ./client
    container_name: urban_frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data:
